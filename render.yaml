services:
  - type: web
    name: smartcrm-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: https://smartcrm-lime.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
